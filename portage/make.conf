COMMON_FLAGS="-march=native -O2 -pipe"
CFLAGS="${COMMON_FLAGS}"
CXXFLAGS="${COMMON_FLAGS}"
FCFLAGS="${COMMON_FLAGS}"
FFLAGS="${COMMON_FLAGS}"

MAKEOPTS="-j12"
EMERGE_DEFAULT_OPTS="--ask --ask-enter-invalid --autounmask=n"

# This sets the language of build output to English.
# Please keep this setting intact when reporting bugs.
LC_MESSAGES=C

ACCEPT_LICENSE="*"

VIDEO_CARDS="amdgpu radeonsi"

USE="man initramfs dist-kernel wayland screencast vaapi networkmanager pulseaudio"
