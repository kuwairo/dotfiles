[env]
TERM = "alacritty"

[window]
padding = { x = 8, y = 8 }

[scrolling]
history = 65536

[font]
size = 10

[font.normal]
family = "Cascadia Mono"
style =  "Regular"

[font.bold]
family = "Cascadia Mono"
style =  "Bold"

[font.italic]
family = "Cascadia Mono"
style =  "Regular"

[font.bold_italic]
family = "Cascadia Mono"
style =  "Bold"

[colors.primary]
background = "#2d353b"
foreground = "#d3c6aa"

[colors.normal]
black   = "#475258"
red     = "#e67e80"
green   = "#a7c080"
yellow  = "#dbbc7f"
blue    = "#7fbbb3"
magenta = "#d699b6"
cyan    = "#83c092"
white   = "#d3c6aa"

[colors.bright]
black   = "#475258"
red     = "#e67e80"
green   = "#a7c080"
yellow  = "#dbbc7f"
blue    = "#7fbbb3"
magenta = "#d699b6"
cyan    = "#83c092"
white   = "#d3c6aa"

[cursor]
style = { shape = "Beam", blinking = "On" }
