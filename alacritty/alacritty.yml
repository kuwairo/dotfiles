env:
  TERM: xterm-256color

window:
  padding:
    x: 8
    y: 8

cursor:
  style:
    shape: Block
    blinking: On

font:
  normal:
    family: JetBrains Mono NL
    style: Regular

  bold:
    family: JetBrains Mono NL
    style: Bold

  italic:
    family: JetBrains Mono NL
    style: Italic

  bold_italic:
    family: JetBrains Mono NL
    style: Bold Italic

  size: 10

colors:
  primary:
    background: '#1a1b26'
    foreground: '#a9b1d6'

  normal:
    black:   '#32344a'
    red:     '#f7768e'
    green:   '#9ece6a'
    yellow:  '#e0af68'
    blue:    '#7aa2f7'
    magenta: '#ad8ee6'
    cyan:    '#449dab'
    white:   '#787c99'

  bright:
    black:   '#444b6a'
    red:     '#ff7a93'
    green:   '#b9f27c'
    yellow:  '#ff9e64'
    blue:    '#7da6ff'
    magenta: '#bb9af7'
    cyan:    '#0db9d7'
    white:   '#acb0d0'
